<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magnolia Avenue Events · Fort Worth</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FAFAF8;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.badge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.card{background:white;border-radius:12px;padding:16px 20px;display:flex;gap:18px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:11px}
.pill{padding:6px 14px;font-size:13px;border-radius:20px;cursor:pointer;border:1px solid #ddd;background:white;color:#555}
.pill.active{border:none;background:#8B0000;color:white;font-weight:600}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:#333}
.field input,.field select,.field textarea{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:100%}
.field textarea{resize:vertical}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600}
.btn-red{background:#8B0000;color:white}
.btn-green{background:#388E3C;color:white}
.btn-danger{background:#D32F2F;color:white}
.btn-gray{background:#eee;color:#333}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;border-radius:6px 6px 0 0;background:transparent;color:rgba(255,255,255,.78)}
.tab.active{background:white;color:#8B0000}
.pending-card{background:#FFFBF0;border:1px solid #FFE082;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.live-card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:12px}
.success-banner{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:12px 16px;margin-bottom:18px;color:#1B5E20;font-weight:600}
@media print{
  #header,#tabs,#filters,.no-print{display:none!important}
  body{background:white}
  #newsletter-card{box-shadow:none!important;border:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ─────────────────────────────────────────────────────
const ADMIN_PASS = "andthen2026"; // change before sharing!
 
const BUSINESSES = [
  {name:"Cherry Coffee",                address:"1121 W Magnolia Ave, Fort Worth, TX"},
  {name:"Ellerbe Fine Foods",           address:"1501 W Magnolia Ave, Fort Worth, TX"},
  {name:"Ephemera",                     address:"1208 W Magnolia Ave, Fort Worth, TX"},
  {name:"Leaves Bakery and Books",      address:"1251 W Magnolia Ave, Fort Worth, TX"},
  {name:"Melt Ice Creams",              address:"1201 W Magnolia Ave, Fort Worth, TX"},
  {name:"Proper",                       address:"409 W Magnolia Ave, Fort Worth, TX"},
  {name:"SiNaCa Studios",               address:"1013 W Magnolia Ave, Fort Worth, TX"},
  {name:"The Usual",                    address:"1408 W Magnolia Ave, Fort Worth, TX"},
  {name:"Walloon's",                   address:"701 W Magnolia Ave, Fort Worth, TX"},
  {name:"West Magnolia Plastic Surgery",address:"1200 W Magnolia Ave, Fort Worth, TX"},
  {name:"Other / Not Listed",           address:""},
];
 
const CATEGORIES = ["All","Dining","Shopping","Community","Art and Music","Health and Wellness","Other"];
const CAT = {
  "Dining":            {bg:"#FFF3E0",fg:"#BF360C",dot:"#FF6D00"},
  "Shopping":          {bg:"#E8F5E9",fg:"#1B5E20",dot:"#43A047"},
  "Community":         {bg:"#E3F2FD",fg:"#0D47A1",dot:"#1E88E5"},
  "Art and Music":     {bg:"#F3E5F5",fg:"#4A148C",dot:"#8E24AA"},
  "Health and Wellness":{bg:"#FCE4EC",fg:"#880E4F",dot:"#E91E63"},
  "Other":             {bg:"#F5F5F5",fg:"#424242",dot:"#9E9E9E"},
};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
 
];
 
// ── STATE ──────────────────────────────────────────────────────
let S = {
  view:"calendar",
  events: (() => { try{const v=localStorage.getItem("mag-v5");return v?JSON.parse(v):SAMPLE}catch{return SAMPLE} })(),
  filter:"All",
  adminOk:false,
  adminInput:"",
  passErr:false,
  submitted:false,
  nlMonth:new Date().getMonth()+1,
  nlYear:new Date().getFullYear(),
  nlView:"month", // "month" | "week" | "nextweek"
  copied:false,
  form:{title:"",business:"",address:"",date:"",time:"",categories:[],description:"",contact:""},
};
 
function save(){try{localStorage.setItem("mag-v5",JSON.stringify(S.events))}catch{}}
function set(patch){Object.assign(S,patch);render()}
function cs(cat){return CAT[cat]||CAT["Other"]}
function fmtDay(ds){const d=new Date(ds+"T12:00:00");return{day:d.getDate(),mon:d.toLocaleDateString("en-US",{month:"short"}),dow:d.toLocaleDateString("en-US",{weekday:"short"}),full:d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}}
 
// ── DOM HELPERS ────────────────────────────────────────────────
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}
function div(s,...k){return h("div",{style:s},...k)}
function span(s,t){return h("span",{style:s},t)}
 
// ── RENDER ─────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  root.appendChild(buildView());
}
 
function buildView(){
  const {view}=S;
  if(view==="newsletter") return buildNewsletter();
  if(view==="adminGate")  return buildAdminGate();
  if(view==="admin")      return buildAdminPanel();
  return buildMain();
}
 
// ── HEADER ─────────────────────────────────────────────────────
function buildHeader(){
  const tabDefs=[["calendar","📅 Events"],["submit","＋ Add Event"],["newsletter","🖨 Newsletter"],["adminGate","🔒 Admin"]];
  const tabs=h("nav",{id:"tabs",style:{display:"flex",gap:"2px"}},
    ...tabDefs.map(([v,label])=>h("button",{
      class:"tab"+(S.view===v||(v==="adminGate"&&S.view==="admin")?" active":""),
      onClick:()=>set({view:v,passErr:false,adminInput:""})
    },label))
  );
  return h("div",{id:"header",style:{background:"#8B0000",color:"white"}},
    div({maxWidth:"940px",margin:"0 auto",padding:"0 22px"},
      div({paddingTop:"20px"},
        h("div",{style:{fontSize:"10px",letterSpacing:"5px",textTransform:"uppercase",opacity:"0.55",marginBottom:"2px"}},"Fort Worth, Texas"),
        h("div",{style:{fontSize:"30px",fontWeight:"900",fontFamily:"Georgia,serif",marginBottom:"2px"}},"Magnolia Avenue"),
        h("div",{style:{fontSize:"13px",opacity:"0.65",marginBottom:"14px"}},"Community Events Calendar")
      ),
      tabs
    )
  );
}
 
// ── MAIN ───────────────────────────────────────────────────────
function buildMain(){
  const pub=S.events.filter(e=>e.approved);
  const filtered=pub.filter(e=>{
    if(S.filter==="All") return true;
    const cats=Array.isArray(e.categories)?e.categories:[e.category];
    return cats.includes(S.filter);
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const wrap=h("div",{});
  wrap.appendChild(buildHeader());
  const inner=div({maxWidth:"940px",margin:"0 auto",padding:"26px 22px"});
  if(S.view==="calendar") inner.appendChild(buildCalendar(filtered,S.events));
  if(S.view==="submit")   inner.appendChild(buildSubmit());
  wrap.appendChild(inner);
  return wrap;
}
 
// ── CALENDAR ───────────────────────────────────────────────────
function buildCalendar(filtered,events){
  const wrap=h("div",{});
 
  // Filter pills
  const row=h("div",{id:"filters",style:{display:"flex",gap:"7px",marginBottom:"18px",flexWrap:"wrap"}});
  CATEGORIES.forEach(cat=>row.appendChild(h("button",{class:"pill"+(S.filter===cat?" active":""),onClick:()=>set({filter:cat})},cat)));
  wrap.appendChild(row);
 
  // Cards
  if(filtered.length===0){
    wrap.appendChild(div({textAlign:"center",padding:"60px 0",color:"#ccc"},
      h("div",{style:{fontSize:"40px"}},"📭"),
      h("div",{style:{marginTop:"10px"}},"No events in this category yet.")
    ));
  } else {
    const list=div({});
    filtered.forEach(e=>list.appendChild(buildCard(e)));
    wrap.appendChild(list);
  }
  return wrap;
}
 
function buildCard(e){
  const c=cs(e.category);
  const fd=fmtDay(e.date);
  const card=div({background:"white",borderRadius:"12px",padding:"16px 20px",display:"flex",gap:"18px",alignItems:"flex-start",boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderLeft:"4px solid "+c.dot,marginBottom:"11px"});
  card.appendChild(div({minWidth:"52px",textAlign:"center",paddingTop:"2px"},
    h("div",{style:{fontSize:"28px",fontWeight:"800",lineHeight:"1",color:"#8B0000"}},String(fd.day)),
    h("div",{style:{fontSize:"10px",textTransform:"uppercase",letterSpacing:"1px",color:"#aaa",marginTop:"1px"}},fd.mon)
  ));
  const info=h("div",{style:{flex:"1"}});
  const titleRow=div({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"});
  titleRow.appendChild(h("span",{style:{fontWeight:"700",fontSize:"16px",color:"#111"}},e.title));
  const eCats=Array.isArray(e.categories)?e.categories:(e.category?[e.category]:[]);
  eCats.forEach(cat=>{const cc=cs(cat);titleRow.appendChild(h("span",{class:"badge",style:{background:cc.bg,color:cc.fg,marginRight:"4px"}},cat));});
  info.appendChild(titleRow);
  const meta=div({fontSize:"13px",color:"#666",marginBottom:"4px"});
  meta.innerHTML=`<strong style="color:#333">${e.business}</strong>${e.address?" · "+e.address:""}${e.time?` · <span style="color:#8B0000">${e.time}</span>`:""}`;
  info.appendChild(meta);
  if(e.description) info.appendChild(h("div",{style:{fontSize:"13.5px",color:"#444",lineHeight:"1.5"}},e.description));
  if(e.contact) info.appendChild(h("div",{style:{fontSize:"12px",color:"#8B0000",marginTop:"5px"}},"✉ "+e.contact));
  if(e.address) info.appendChild(h("a",{href:"https://www.google.com/maps/search/"+encodeURIComponent(e.address),target:"_blank",style:{fontSize:"12px",color:"#1565C0",display:"inline-block",marginTop:"4px"}},"📍 Get directions →"));
  card.appendChild(info);
  return card;
}
 
// ── SUBMIT ─────────────────────────────────────────────────────
function buildSubmit(){
  const wrap=div({maxWidth:"560px"});
  wrap.appendChild(h("h2",{style:{fontSize:"22px",fontWeight:"800",marginBottom:"4px",color:"#111"}},"Add Your Event"));
  wrap.appendChild(h("p",{style:{color:"#888",fontSize:"14px",marginBottom:"22px"}},"Submissions go to the merchants committee for approval before going live."));
  if(S.submitted) wrap.appendChild(h("div",{class:"success-banner"},"✓ Submitted! Your event is pending approval — usually within 24 hours."));
 
  const f=div({display:"flex",flexDirection:"column",gap:"0"});
 
  f.appendChild(fld("Event Name *",h("input",{type:"text",value:S.form.title,placeholder:"e.g. Summer Sale, Live Jazz Night…",
    onInput:e=>{S.form.title=e.target.value}})));
 
  const bizSel=h("select",{onChange:e=>{
    const b=BUSINESSES.find(x=>x.name===e.target.value);
    if(b){
      S.form.business=b.name==="Other / Not Listed"?"":b.name;
      S.form.address=b.address;
      // Show/hide the "Other" text input without full re-render
      const otherField=document.getElementById("other-biz-field");
      if(otherField) otherField.style.display=(!S.form.business)?"block":"none";
    }
  }});
  bizSel.appendChild(h("option",{value:"",disabled:"",selected:""},"— Select your business —"));
  BUSINESSES.forEach(b=>{
    const o=h("option",{value:b.name},b.name);
    if(b.name===S.form.business) o.selected=true;
    bizSel.appendChild(o);
  });
  f.appendChild(fld("Your Business *",bizSel));
 
  // "Other" fallback field — hidden by default, shown only if Other selected
  const otherWrap=fld("Business Name",h("input",{type:"text",value:S.form.business,placeholder:"Your business name",onInput:e=>{S.form.business=e.target.value}}));
  otherWrap.id="other-biz-field";
  otherWrap.style.display="none";
  f.appendChild(otherWrap);
 
  f.appendChild(fld("Date *",h("input",{type:"date",value:S.form.date,onInput:e=>{S.form.date=e.target.value}})));
 
  // Multi-select category checkboxes
  const catWrap=div({marginBottom:"14px"});
  catWrap.appendChild(h("label",{style:{display:"block",fontSize:"13px",fontWeight:"600",color:"#333",marginBottom:"8px"}},"Category (select all that apply)"));
  const checkRow=div({display:"flex",flexWrap:"wrap",gap:"8px"});
  CATEGORIES.filter(c=>c!=="All").forEach(cat=>{
    const checked=(S.form.categories||[]).includes(cat);
    const pill=h("label",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"6px 12px",borderRadius:"20px",cursor:"pointer",fontSize:"13px",fontWeight:"600",border:"2px solid "+(checked?"#8B0000":"#ddd"),background:checked?"#fff5f5":"white",color:checked?"#8B0000":"#555",userSelect:"none"}});
    const cb=h("input",{type:"checkbox",style:{display:"none"}});
    if(checked) cb.checked=true;
    cb.addEventListener("change",()=>{
      let cats=S.form.categories||[];
      if(cb.checked){cats=[...cats,cat];}else{cats=cats.filter(x=>x!==cat);}
      S.form.categories=cats;
      // Update pill style without full re-render
      pill.style.border="2px solid "+(cb.checked?"#8B0000":"#ddd");
      pill.style.background=cb.checked?"#fff5f5":"white";
      pill.style.color=cb.checked?"#8B0000":"#555";
    });
    pill.appendChild(cb);
    pill.appendChild(document.createTextNode(cat));
    checkRow.appendChild(pill);
  });
  catWrap.appendChild(checkRow);
  f.appendChild(catWrap);
 
  f.appendChild(fld("Time",h("input",{type:"text",value:S.form.time,placeholder:"e.g. 6:00 PM – 9:00 PM",onInput:e=>{S.form.time=e.target.value}})));
  f.appendChild(fld("Contact Email *",h("input",{type:"email",value:S.form.contact,placeholder:"so customers can reach you",onInput:e=>{S.form.contact=e.target.value}})));
  f.appendChild(fld("Description",h("textarea",{rows:"3",placeholder:"What should customers know? Specials, parking, what to expect…",onInput:e=>{S.form.description=e.target.value}},S.form.description)));
 
  const submitBtn=h("button",{class:"btn btn-red",style:{alignSelf:"flex-start",padding:"12px 28px",fontSize:"15px"},
    onClick:()=>{
      if(!S.form.title||!S.form.business||!S.form.date||!S.form.contact) return;
      if(!S.form.categories||S.form.categories.length===0) S.form.categories=["Other"];
      S.events.push({...S.form,id:Date.now(),approved:false});
      save();
      S.form={title:"",business:"",address:"",date:"",time:"",categories:[],description:"",contact:""};
      set({submitted:true});
      setTimeout(()=>set({submitted:false}),4000);
    }},"Submit for Approval →");
  f.appendChild(submitBtn);
  f.appendChild(h("div",{style:{fontSize:"12px",color:"#bbb",marginTop:"8px"}},"Events go live within 24 hours after review."));
  wrap.appendChild(f);
  return wrap;
}
 
function fld(label,input,wrapStyle){
  const w=div({marginBottom:"14px",...(wrapStyle||{})});
  w.appendChild(h("label",{style:{display:"block",fontSize:"13px",fontWeight:"600",color:"#333",marginBottom:"4px"}},label));
  Object.assign(input.style,{width:"100%",padding:"10px 12px",border:"1px solid #ddd",borderRadius:"8px",fontSize:"14px"});
  w.appendChild(input);
  return w;
}
 
// ── NEWSLETTER ─────────────────────────────────────────────────
function getWeekBounds(offsetWeeks){
  // Returns {start, end} as YYYY-MM-DD strings for a given week offset from today
  const now=new Date();
  const dow=now.getDay(); // 0=Sun
  const startOfWeek=new Date(now);
  startOfWeek.setDate(now.getDate()-dow+(offsetWeeks*7));
  startOfWeek.setHours(0,0,0,0);
  const endOfWeek=new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate()+6);
  return {
    start: startOfWeek.toISOString().slice(0,10),
    end:   endOfWeek.toISOString().slice(0,10),
    label: startOfWeek.toLocaleDateString("en-US",{month:"long",day:"numeric"})+" – "+endOfWeek.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})
  };
}
 
function buildNewsletter(){
  const mo=S.nlMonth,yr=S.nlYear,nv=S.nlView;
 
  // Determine which events to show based on view mode
  let evs, periodLabel, subLabel;
  if(nv==="week"||nv==="nextweek"){
    const wb=getWeekBounds(nv==="week"?0:1);
    evs=S.events.filter(e=>e.approved&&e.date>=wb.start&&e.date<=wb.end).sort((a,b)=>a.date.localeCompare(b.date));
    periodLabel=nv==="week"?"This Week":"Next Week";
    subLabel=wb.label;
  } else {
    const ms=String(mo).padStart(2,"0");
    evs=S.events.filter(e=>e.approved&&e.date.startsWith(yr+"-"+ms)).sort((a,b)=>a.date.localeCompare(b.date));
    periodLabel=MONTHS[mo-1]+" "+yr;
    subLabel="Fort Worth, Texas · Magnolia Avenue";
  }
 
  const plainText=[
    "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
    "WHAT'S HAPPENING ON MAGNOLIA AVENUE",
    periodLabel.toUpperCase()+(nv!=="month"?" · "+subLabel.toUpperCase():" · FORT WORTH, TEXAS"),
    "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━","",
    "Your neighborhood is alive! Here's what's coming up.","",
    ...evs.map(e=>{const fd=fmtDay(e.date);return`▸ ${e.title.toUpperCase()}\n  ${fd.full}${e.time?" · "+e.time:""}\n  ${e.business}${e.address?" · "+e.address:""}\n  ${e.description}\n  Contact: ${e.contact}\n`}),
    "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
    "Support local. Stay longer. Come back soon.",
    "— The Merchants of Magnolia Avenue, Fort Worth"
  ].join("\n");
 
  const page=h("div",{});
  page.appendChild(buildHeader());
  const inner=div({maxWidth:"700px",margin:"0 auto",padding:"28px 22px"});
 
  // ── View toggle: Week / Next Week / Month ──
  const toggleWrap=h("div",{class:"no-print",style:{display:"flex",gap:"6px",marginBottom:"16px",background:"#f0ece8",borderRadius:"10px",padding:"4px",width:"fit-content"}});
  [["week","This Week"],["nextweek","Next Week"],["month","Full Month"]].forEach(([v,label])=>{
    toggleWrap.appendChild(h("button",{
      onClick:()=>set({nlView:v}),
      style:{padding:"7px 16px",fontSize:"13px",fontWeight:"600",border:"none",borderRadius:"7px",cursor:"pointer",
        background:nv===v?"#8B0000":"transparent",
        color:nv===v?"white":"#666",transition:"all 0.15s"}
    },label));
  });
  inner.appendChild(toggleWrap);
 
  // Controls row
  const ctrl=h("div",{class:"no-print",style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"20px",flexWrap:"wrap"}});
  if(nv==="month"){
    const moSel=h("select",{style:{padding:"8px 11px",border:"1px solid #ddd",borderRadius:"6px",fontSize:"14px"},onChange:e=>set({nlMonth:Number(e.target.value)})});
    MONTHS.forEach((m,i)=>{const o=h("option",{value:i+1},m);if(i+1===mo)o.selected=true;moSel.appendChild(o);});
    const yrSel=h("select",{style:{padding:"8px 11px",border:"1px solid #ddd",borderRadius:"6px",fontSize:"14px"},onChange:e=>set({nlYear:Number(e.target.value)})});
    [2026,2027,2028].forEach(y=>{const o=h("option",{value:y},String(y));if(y===yr)o.selected=true;yrSel.appendChild(o);});
    ctrl.appendChild(moSel);
    ctrl.appendChild(yrSel);
  }
  ctrl.appendChild(h("button",{class:"btn btn-red",onClick:()=>window.print()},"🖨 Print / PDF"));
  ctrl.appendChild(h("button",{class:"btn",style:{background:S.copied?"#388E3C":"#444",color:"white"},
    onClick:()=>{navigator.clipboard.writeText(plainText).then(()=>{set({copied:true});setTimeout(()=>set({copied:false}),2500);})}},
    S.copied?"✓ Copied!":"📋 Copy Text"));
  inner.appendChild(ctrl);
 
  // Print card
  const card=h("div",{id:"newsletter-card",style:{background:"white",border:"1px solid #e0ddd8",borderRadius:"12px",overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.07)"}});
  card.appendChild(div({background:"#8B0000",color:"white",padding:"28px 32px",textAlign:"center"},
    h("div",{style:{fontSize:"10px",letterSpacing:"5px",textTransform:"uppercase",opacity:".6",marginBottom:"6px"}},"Fort Worth, Texas · Magnolia Avenue"),
    h("div",{style:{fontSize:"36px",fontWeight:"700",fontFamily:"Georgia,serif",marginBottom:"4px"}},"What's Happening"),
    h("div",{style:{fontSize:"18px",opacity:".8"}},periodLabel),
    nv!=="month"?h("div",{style:{fontSize:"13px",opacity:".65",marginTop:"4px"}},subLabel):null
  ));
  card.appendChild(div({padding:"18px 32px 4px",textAlign:"center",color:"#777",fontSize:"14px",fontStyle:"italic"},
    nv==="month"?"Your neighborhood is alive. Here's what's coming up on Magnolia Avenue this month.":
    "Here's what's happening on Magnolia Avenue "+( nv==="week"?"this week":"next week")+"."));
 
  const evList=div({padding:"12px 32px 28px"});
  const emptyMsg=nv==="month"?"No events this month yet — submit yours!":nv==="week"?"No events this week yet.":"No events next week yet.";
  if(evs.length===0){
    evList.appendChild(h("p",{style:{textAlign:"center",color:"#bbb",fontStyle:"italic",padding:"40px 0"}},emptyMsg));
  } else {
    evs.forEach((e,idx)=>{
      const c=cs(e.category);const fd=fmtDay(e.date);
      const row=div({display:"flex",gap:"20px",padding:"18px 0",borderBottom:idx<evs.length-1?"1px solid #f0ece8":"none"});
      row.appendChild(div({minWidth:"52px",textAlign:"center"},
        h("div",{style:{fontSize:"30px",fontWeight:"800",lineHeight:"1",color:"#8B0000"}},String(fd.day)),
        h("div",{style:{fontSize:"10px",textTransform:"uppercase",letterSpacing:"1px",color:"#bbb",marginTop:"2px"}},fd.dow)
      ));
      const info=h("div",{style:{flex:"1"}});
      const tr=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px",flexWrap:"wrap"});
      tr.appendChild(h("span",{style:{fontWeight:"700",fontSize:"16px"}},e.title));
      const nlCats=Array.isArray(e.categories)?e.categories:(e.category?[e.category]:[]);
      nlCats.forEach(cat=>{const cc=cs(cat);tr.appendChild(h("span",{class:"badge",style:{background:cc.bg,color:cc.fg,marginRight:"3px"}},cat));});
      info.appendChild(tr);
      const ml=div({fontSize:"13px",color:"#777",marginBottom:"4px"});
      ml.innerHTML=`<strong style="color:#444">${e.business}</strong>${e.address?" · "+e.address:""}${e.time?` · <span style="color:#8B0000">${e.time}</span>`:""}`;
      info.appendChild(ml);
      if(e.description) info.appendChild(h("div",{style:{fontSize:"13.5px",color:"#333",lineHeight:"1.55"}},e.description));
      if(e.contact) info.appendChild(h("div",{style:{fontSize:"12px",color:"#8B0000",marginTop:"4px"}},"✉ "+e.contact));
      row.appendChild(info);
      evList.appendChild(row);
    });
  }
  card.appendChild(evList);
  card.appendChild(div({background:"#F9F6F1",borderTop:"1px solid #e8e2d8",padding:"14px 32px",textAlign:"center"},
    h("div",{style:{fontSize:"12px",color:"#999"}},"Support local · Stay longer · Come back soon"),
    h("div",{style:{fontSize:"11px",color:"#bbb",marginTop:"2px"}},"Magnolia Avenue · Fort Worth, Texas")
  ));
  inner.appendChild(card);
  page.appendChild(inner);
  return page;
}
 
// ── ADMIN GATE ─────────────────────────────────────────────────
function buildAdminGate(){
  const page=h("div",{});
  page.appendChild(buildHeader());
  page.appendChild(div({minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center"},
    div({background:"white",borderRadius:"14px",padding:"40px 44px",boxShadow:"0 4px 28px rgba(0,0,0,.10)",width:"340px",maxWidth:"90vw"},
      div({textAlign:"center",marginBottom:"24px"},
        h("div",{style:{fontSize:"36px",marginBottom:"8px"}},"🔐"),
        h("div",{style:{fontWeight:"800",fontSize:"20px",color:"#8B0000"}},"Admin Access"),
        h("div",{style:{fontSize:"13px",color:"#aaa",marginTop:"3px"}},"Merchants committee only")
      ),
      h("input",{type:"password",placeholder:"Password",value:S.adminInput,
        style:{width:"100%",padding:"11px 13px",border:"1.5px solid "+(S.passErr?"#D32F2F":"#ddd"),borderRadius:"8px",fontSize:"15px",marginBottom:"8px",display:"block"},
        onInput:e=>{S.adminInput=e.target.value},
        onKeydown:e=>{if(e.key==="Enter") tryAdmin()}}),
      S.passErr?h("div",{style:{color:"#D32F2F",fontSize:"12px",marginBottom:"8px"}},"Incorrect password."):null,
      h("button",{class:"btn btn-red",style:{width:"100%",padding:"12px",fontSize:"15px"},onClick:tryAdmin},"Enter"),
      h("button",{style:{width:"100%",marginTop:"8px",padding:"10px",background:"transparent",color:"#aaa",border:"none",cursor:"pointer",fontSize:"13px"},
        onClick:()=>set({view:"calendar",adminInput:"",passErr:false})},"← Back to calendar")
    )
  ));
  return page;
}
 
function tryAdmin(){
  if(S.adminInput===ADMIN_PASS){set({view:"admin",adminOk:true,passErr:false});}
  else set({passErr:true});
}
 
// ── ADMIN PANEL ────────────────────────────────────────────────
function buildAdminPanel(){
  const pending=S.events.filter(e=>!e.approved);
  const approved=S.events.filter(e=>e.approved);
  const page=h("div",{});
  page.appendChild(buildHeader());
  const inner=div({maxWidth:"700px",margin:"0 auto",padding:"28px 22px"});
 
  // heading
  const hrow=div({display:"flex",alignItems:"center",gap:"12px",marginBottom:"24px"});
  hrow.appendChild(h("button",{class:"btn btn-gray",onClick:()=>set({view:"calendar",adminOk:false,adminInput:""})},"← Back"));
  hrow.appendChild(h("h2",{style:{fontSize:"22px",fontWeight:"800",color:"#8B0000",margin:"0"}},"Admin Panel"));
  if(pending.length>0) hrow.appendChild(span({background:"#FF6D00",color:"white",borderRadius:"20px",padding:"2px 10px",fontSize:"12px",fontWeight:"700"},pending.length+" pending"));
  inner.appendChild(hrow);
 
  // pending
  inner.appendChild(h("div",{class:"section-label"},`Pending Approval (${pending.length})`));
  if(pending.length===0){
    inner.appendChild(h("div",{style:{color:"#bbb",fontStyle:"italic",fontSize:"14px",paddingBottom:"24px"}},"All caught up — no pending submissions."));
  } else {
    pending.forEach(e=>{
      const card=h("div",{class:"pending-card"});
      card.appendChild(h("div",{style:{fontWeight:"700",fontSize:"15px",marginBottom:"2px"}},e.title));
      card.appendChild(h("div",{style:{fontSize:"13px",color:"#555",marginBottom:"2px"}},e.business+" · "+e.date+(e.time?" · "+e.time:"")));
      if(e.address) card.appendChild(h("div",{style:{fontSize:"13px",color:"#777",marginBottom:"2px"}},e.address));
      card.appendChild(h("div",{style:{fontSize:"13px",color:"#333",marginBottom:"6px"}},e.description));
      card.appendChild(h("div",{style:{fontSize:"12px",color:"#8B0000",marginBottom:"10px"}},"✉ "+e.contact));
      const btns=div({display:"flex",gap:"8px"});
      btns.appendChild(h("button",{class:"btn btn-green",onClick:()=>{S.events=S.events.map(x=>x.id===e.id?{...x,approved:true}:x);save();render();}},"✓ Approve"));
      btns.appendChild(h("button",{class:"btn btn-danger",onClick:()=>{S.events=S.events.filter(x=>x.id!==e.id);save();render();}},"✗ Reject"));
      card.appendChild(btns);
      inner.appendChild(card);
    });
  }
 
  // live
  inner.appendChild(h("div",{class:"section-label",style:{marginTop:"16px"}},`Live Events (${approved.length})`));
  approved.forEach(e=>{
    const card=h("div",{class:"live-card"});
    const info=h("div",{});
    info.appendChild(h("div",{style:{fontWeight:"600",fontSize:"14px"}},e.title));
    info.appendChild(h("div",{style:{fontSize:"12px",color:"#888"}},e.business+" · "+e.date));
    card.appendChild(info);
    card.appendChild(h("button",{style:{padding:"5px 12px",background:"#fafafa",color:"#c62828",border:"1px solid #e0e0e0",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:"600"},
      onClick:()=>{S.events=S.events.filter(x=>x.id!==e.id);save();render();}},"Remove"));
    inner.appendChild(card);
  });
 
  page.appendChild(inner);
  return page;
}
 
// ── BOOT ───────────────────────────────────────────────────────
render();
</script>
