<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FAFAF8;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.badge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.pill{padding:6px 14px;font-size:13px;border-radius:20px;cursor:pointer;border:1px solid #ddd;background:white;color:#555}
.pill.active{border:none;background:#8B0000;color:white;font-weight:600}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600}
.btn-red{background:#8B0000;color:white}
.btn-green{background:#388E3C;color:white}
.btn-danger{background:#D32F2F;color:white}
.btn-gray{background:#eee;color:#333}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;border-radius:6px 6px 0 0;background:transparent;color:rgba(255,255,255,.78)}
.tab.active{background:white;color:#8B0000}
.pending-card{background:#FFFBF0;border:1px solid #FFE082;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.live-card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:12px}
.success-banner{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:12px 16px;margin-bottom:18px;color:#1B5E20;font-weight:600}
.error-banner{background:#FFEBEE;border:1px solid #FFCDD2;border-radius:8px;padding:12px 16px;margin-bottom:18px;color:#B71C1C;font-weight:600}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(139,0,0,.2);border-top-color:#8B0000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  #header,#tabs,#filters,.no-print{display:none!important}
  body{background:white}
  #newsletter-card{box-shadow:none!important;border:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>

// ── API CALLS (to our own serverless function) ────────────────────────────────
function fromAT(rec){
  const f=rec.fields;
  return{id:rec.id,title:f.title||"",business:f.business||"",address:f.address||"",
    date:f.date||"",endDate:f.endDate||f.date||"",time:f.time||"",
    categories:Array.isArray(f.categories)?f.categories:(f.categories?[f.categories]:[]),
    description:f.description||"",contact:f.contact||"",approved:!!f.approved};
}

async function apiLoadEvents(){
  const r=await fetch(API);
  if(!r.ok) throw new Error("Failed to load events");
  const data=await r.json();
  return(data.records||[]).map(fromAT);
}

async function apiCreateEvent(fields){
  const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({records:[{fields}]})});
  if(!r.ok) throw new Error("Failed to submit event");
  const data=await r.json();
  return fromAT(data.records[0]);
}

async function apiApproveEvent(id){
  const r=await fetch(API+"?id="+id,{method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields:{approved:true}})});
  if(!r.ok) throw new Error("Failed to approve event");
  return r.json();
}

async function apiUpdateEvent(id,fields){
  const r=await fetch(API+"?id="+id,{method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields})});
  if(!r.ok) throw new Error("Failed to update event");
  return r.json();
}

async function apiDeleteEvent(id){
  const r=await fetch(API+"?id="+id,{method:"DELETE"});
  if(!r.ok) throw new Error("Failed to delete event");
}

// ── BUSINESSES API ───────────────────────────────────────────────────────────
const BIZ_URL = "/api/businesses";

function fromATBiz(rec){
  const f=rec.fields;
  return{
    id:rec.id,
    name:f.name||"",
    description:f.description||"",
    knownFor:f.knownFor||"",
    mustTry:f.mustTry||"",
    bestTime:f.bestTime||"",
    hours:f.hours||"",
    website:f.website||"",
    instagram:f.instagram||"",
  };
}

async function apiLoadBusinesses(){
  const r=await fetch(BIZ_URL);
  if(!r.ok) throw new Error("Failed to load businesses");
  const data=await r.json();
  return(data.records||[]).map(fromATBiz);
}

async function apiSaveBusiness(biz){
  const isNew=!biz.id||biz.id.startsWith("local-");
  const fields={name:biz.name,description:biz.description,knownFor:biz.knownFor,
    mustTry:biz.mustTry,bestTime:biz.bestTime,hours:biz.hours,
    website:biz.website,instagram:biz.instagram};
  if(isNew){
    const r=await fetch(BIZ_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({records:[{fields}]})});
    if(!r.ok) throw new Error("Failed to create business");
    const data=await r.json();
    return fromATBiz(data.records[0]);
  } else {
    const r=await fetch(BIZ_URL+"?id="+biz.id,{method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fields})});
    if(!r.ok) throw new Error("Failed to update business");
    const data=await r.json();
    return fromATBiz(data);
  }
}

async function apiDeleteBusiness(id){
  await fetch(BIZ_URL+"?id="+id,{method:"DELETE"});
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  view:"calendar",events:[],loading:true,error:null,
  filter:"All",adminOk:false,adminInput:"",passErr:false,
  submitted:false,submitting:false,
  nlMonth:new Date().getMonth()+1,nlYear:new Date().getFullYear(),nlView:"month",
  copied:false,
  form:{title:"",business:"",address:"",date:"",endDate:"",time:"",categories:[],description:"",contact:""},
  itin:{date:"",interests:[],result:null,loading:false,error:null},
  businesses:[],
  bizLoading:false,
  bizEdit:null,  // business being edited (null = none)
  bizSaving:false,
  bizError:null,
};

function set(patch){Object.assign(S,patch);render();}
function cs(cat){return CAT[cat]||CAT["Other"];}
function fmtDay(ds){const d=new Date(ds+"T12:00:00");return{day:d.getDate(),
  mon:d.toLocaleDateString("en-US",{month:"short"}),
  dow:d.toLocaleDateString("en-US",{weekday:"short"}),
  full:d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})};}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}
function div(s,...k){return h("div",{style:s},...k);}
function span(s,t){return h("span",{style:s},t);}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){const root=document.getElementById("root");root.innerHTML="";root.appendChild(buildView());}
function buildView(){
  const{view}=S;
  if(view==="newsletter") return buildNewsletter();
  if(view==="adminGate")  return buildAdminGate();
  if(view==="admin")      return buildAdminPanel();
  if(view==="itinerary")  return buildItineraryPage();
  if(view==="businesses") return buildBusinessesPage();
  return buildMain();
}

// ── HEADER ────────────────────────────────────────────────────────────────────

function buildMain(){
  const pub=S.events.filter(e=>e.approved);

    if(S.filter==="All") return true;
    return(Array.isArray(e.categories)?e.categories:[e.category||""]).includes(S.filter);

  wrap.appendChild(buildHeader());
  const inner=div({maxWidth:"940px",margin:"0 auto",padding:"26px 22px"});
  if(S.view==="calendar") inner.appendChild(buildCalendar(filtered));
  if(S.view==="submit")   inner.appendChild(buildSubmit());
  wrap.appendChild(inner);

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function buildCalendar(filtered){
  const wrap=h("div",{});
  const subBar=div({display:"flex",justifyContent:"flex-end",marginBottom:"12px"});
  subBar.appendChild(h("button",{class:"btn",style:{background:"white",color:"#8B0000",border:"1px solid #8B0000",fontSize:"12px",padding:"6px 14px"},
    onClick:showIcsModal},"📅 Subscribe to Calendar"));
  wrap.appendChild(subBar);
  const row=h("div",{id:"filters",style:{display:"flex",gap:"7px",marginBottom:"18px",flexWrap:"wrap"}});
  CATEGORIES.forEach(cat=>row.appendChild(h("button",{class:"pill"+(S.filter===cat?" active":""),onClick:()=>set({filter:cat})},cat)));

  if(S.loading){
    wrap.appendChild(div({display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",padding:"60px 0",color:"#aaa"},
      h("div",{class:"spinner"}),h("span",{},"Loading events…")));

  }
  if(S.error) wrap.appendChild(h("div",{class:"error-banner"},"⚠ Could not load events: "+S.error));
  if(filtered.length===0&&!S.error){
    wrap.appendChild(div({textAlign:"center",padding:"60px 0",color:"#ccc"},
      h("div",{style:{fontSize:"40px"}},"📭"),h("div",{style:{marginTop:"10px"}},"No events in this category yet.")));
  }else{
    const list=div({});filtered.forEach(e=>list.appendChild(buildCard(e)));wrap.appendChild(list);
  }
  return wrap;

function buildCard(e){
  const cats=Array.isArray(e.categories)?e.categories:(e.category?[e.category]:[]);
  const c=cs(cats[0]||"Other");const fd=fmtDay(e.date);
  const isMultiDay=e.endDate&&e.endDate!==e.date;
  const fdEnd=isMultiDay?fmtDay(e.endDate):null;
  const card=div({background:"white",borderRadius:"12px",padding:"16px 20px",display:"flex",gap:"18px",
    alignItems:"flex-start",boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderLeft:"4px solid "+c.dot,marginBottom:"11px"});
  const dateBlock=isMultiDay
    ? div({minWidth:"88px",textAlign:"center",paddingTop:"2px"},
        div({display:"flex",alignItems:"center",gap:"3px"},
          div({textAlign:"center"},
            h("div",{style:{fontSize:"22px",fontWeight:"800",lineHeight:"1",color:"#8B0000"}},String(fd.day)),
            h("div",{style:{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1px",color:"#aaa"}},fd.mon)),
          h("div",{style:{color:"#ccc",fontSize:"14px"}},"→"),
          div({textAlign:"center"},
            h("div",{style:{fontSize:"22px",fontWeight:"800",lineHeight:"1",color:"#8B0000"}},String(fdEnd.day)),
            h("div",{style:{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1px",color:"#aaa"}},fdEnd.mon))))
    : div({minWidth:"52px",textAlign:"center",paddingTop:"2px"},
        h("div",{style:{fontSize:"28px",fontWeight:"800",lineHeight:"1",color:"#8B0000"}},String(fd.day)),
        h("div",{style:{fontSize:"10px",textTransform:"uppercase",letterSpacing:"1px",color:"#aaa",marginTop:"1px"}},fd.mon));
  card.appendChild(dateBlock);
  const info=h("div",{style:{flex:"1"}});
  const titleRow=div({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"});
  titleRow.appendChild(h("span",{style:{fontWeight:"700",fontSize:"16px",color:"#111"}},e.title));
  cats.forEach(cat=>{const cc=cs(cat);titleRow.appendChild(h("span",{class:"badge",style:{background:cc.bg,color:cc.fg,marginRight:"4px"}},cat));});
  info.appendChild(titleRow);
  const meta=div({fontSize:"13px",color:"#666",marginBottom:"4px"});
  meta.innerHTML=`<strong style="color:#333">${e.business}</strong>${e.address?" · "+e.address:""}${e.time?` · <span style="color:#8B0000">${e.time}</span>`:""}`;
  info.appendChild(meta);
  if(e.description) info.appendChild(h("div",{style:{fontSize:"13.5px",color:"#444",lineHeight:"1.5",whiteSpace:"pre-wrap"}},e.description));
  if(e.contact) info.appendChild(h("div",{style:{fontSize:"12px",color:"#8B0000",marginTop:"5px"}},"✉ "+e.contact));
  const actionRow=div({display:"flex",gap:"16px",marginTop:"6px",flexWrap:"wrap"});
  if(e.address) actionRow.appendChild(h("a",{href:"https://www.google.com/maps/search/"+encodeURIComponent(e.address),
    target:"_blank",style:{fontSize:"12px",color:"#1565C0",textDecoration:"none"}},"📍 Get directions →"));
  actionRow.appendChild(h("a",{href:"#",style:{fontSize:"12px",color:"#8B0000",textDecoration:"none"},
    onClick:ev=>{ev.preventDefault();downloadSingleIcs(e);}},"📅 Add to my calendar"));
  info.appendChild(actionRow);card.appendChild(info);
  return card;
}

// ── ICS ───────────────────────────────────────────────────────────────────────
function buildIcsContent(events){
  const pad=n=>String(n).padStart(2,"0");
  function icsDate(ds){const d=new Date(ds+"T12:00:00");return`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;}
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Magnolia Avenue Events//EN",
    "X-WR-CALNAME:Magnolia Avenue Events","CALSCALE:GREGORIAN"];
  events.forEach(e=>{
    const endDt=e.endDate&&e.endDate!==e.date?e.endDate:e.date;
    const endDtEx=(ds=>{const d=new Date(ds+"T12:00:00");d.setDate(d.getDate()+1);return`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;})(endDt);
    const icsDesc=[e.time?"Time: "+e.time:"",e.business,e.description||"",e.contact?"Contact: "+e.contact:""].filter(Boolean).join("\n").replace(/\n/g,"\\n");
    lines.push("BEGIN:VEVENT",
      `UID:${e.id}@magnolia-events`,
      `DTSTART;VALUE=DATE:${icsDate(e.date)}`,
      `DTEND;VALUE=DATE:${endDtEx}`,
      `SUMMARY:${e.title} @ ${e.business}`,
      `DESCRIPTION:${icsDesc}`,
      `LOCATION:${e.address||"Magnolia Ave, Fort Worth TX"}`,
      "END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function downloadSingleIcs(e){
  const blob=new Blob([buildIcsContent([e])],{type:"text/calendar;charset=utf-8"});
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:e.title.replace(/[^a-z0-9]/gi,"_")+".ics"});
  a.click();
}

function showIcsModal(){
  const approved=S.events.filter(e=>e.approved);
  const b64=btoa(unescape(encodeURIComponent(buildIcsContent(approved))));
  const dataUrl="data:text/calendar;base64,"+b64;
  const overlay=div({position:"fixed",top:"0",left:"0",right:"0",bottom:"0",background:"rgba(0,0,0,.5)",zIndex:"1000",display:"flex",alignItems:"center",justifyContent:"center"});
  const modal=div({background:"white",borderRadius:"14px",padding:"32px",maxWidth:"460px",width:"90vw",boxShadow:"0 8px 40px rgba(0,0,0,.2)"});
  modal.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"800",color:"#8B0000",marginBottom:"8px"}},"📅 Subscribe to Calendar"));
  modal.appendChild(h("p",{style:{fontSize:"14px",color:"#555",marginBottom:"20px",lineHeight:"1.6"}},"Add all Magnolia Ave events to your calendar. New events will appear automatically after you subscribe."));
  modal.appendChild(h("a",{href:"https://calendar.google.com/calendar/r/settings/addbyurl",target:"_blank",
    style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 16px",borderRadius:"10px",border:"1px solid #ddd",marginBottom:"10px",textDecoration:"none",color:"#111",background:"#fafafa"}},
    h("span",{style:{fontSize:"22px"}},"📆"),
    div({flex:"1"},h("div",{style:{fontWeight:"700",fontSize:"14px"}},"Google Calendar"),h("div",{style:{fontSize:"12px",color:"#888"}},"Open Google Calendar → paste the URL below"))));
  modal.appendChild(h("a",{href:dataUrl,download:"magnolia-ave-events.ics",
    style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 16px",borderRadius:"10px",border:"1px solid #ddd",marginBottom:"16px",textDecoration:"none",color:"#111",background:"#fafafa"}},
    h("span",{style:{fontSize:"22px"}},"🍎"),
    div({flex:"1"},h("div",{style:{fontWeight:"700",fontSize:"14px"}},"Apple Calendar / Outlook"),h("div",{style:{fontSize:"12px",color:"#888"}},"Downloads .ics file — open to import"))));
  const siteUrl=window.location.origin+"/api/ics";
  modal.appendChild(div({background:"#f5f5f5",borderRadius:"8px",padding:"12px",marginBottom:"16px"},
    h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#444",marginBottom:"4px"}},"Calendar subscription URL:"),
    h("div",{style:{fontFamily:"monospace",fontSize:"11px",wordBreak:"break-all",color:"#333",userSelect:"all"}},siteUrl)));
  modal.appendChild(h("button",{class:"btn btn-gray",style:{width:"100%"},onClick:()=>overlay.remove()},"Close"));
  overlay.appendChild(modal);document.body.appendChild(overlay);
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function buildSubmit(){
  const wrap=div({maxWidth:"560px"});
  wrap.appendChild(h("h2",{style:{fontSize:"22px",fontWeight:"800",marginBottom:"4px",color:"#111"}},"Add Your Event"));

function getWeekBounds(offsetWeeks){
  const now=new Date(),dow=now.getDay();
  const start=new Date(now);start.setDate(now.getDate()-dow+(offsetWeeks*7));start.setHours(0,0,0,0);
  const end=new Date(start);end.setDate(start.getDate()+6);
  return{start:start.toISOString().slice(0,10),end:end.toISOString().slice(0,10),
    label:start.toLocaleDateString("en-US",{month:"long",day:"numeric"})+" – "+end.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})};
}

function showEditModal(e){
  // Pre-populate edit fields from the event
  let edited={...e};

  const overlay=div({position:"fixed",top:"0",left:"0",right:"0",bottom:"0",
    background:"rgba(0,0,0,.55)",zIndex:"1000",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"});

      Object.assign(inputEl.style,{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:"7px",fontSize:"14px",boxSizing:"border-box"});

    }});

    Object.assign(startIn.style,{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:"7px",fontSize:"14px"});
    sd.appendChild(startIn);dateRow.appendChild(sd);
    const ed=div({flex:"1"});ed.appendChild(h("label",{style:{display:"block",fontSize:"13px",fontWeight:"600",color:"#333",marginBottom:"4px"}},"End Date"));

    const timeIn=h("input",{type:"text",value:edited.time||"",placeholder:"e.g. 6:00 PM – 9:00 PM",onInput:ev=>{edited.time=ev.target.value;}});
    modal.appendChild(ef("Time",timeIn));

    // Categories
    const catWrap=div({marginBottom:"14px"});
    catWrap.appendChild(h("label",{style:{display:"block",fontSize:"13px",fontWeight:"600",color:"#333",marginBottom:"8px"}},"Categories"));
    const checkRow=div({display:"flex",flexWrap:"wrap",gap:"8px"});

      const checked=(edited.categories||[]).includes(cat);
      const pill=h("label",{style:{display:"flex",alignItems:"center",gap:"5px",padding:"5px 11px",borderRadius:"20px",
        cursor:"pointer",fontSize:"13px",fontWeight:"600",userSelect:"none",
        border:"2px solid "+(checked?"#8B0000":"#ddd"),background:checked?"#fff5f5":"white",color:checked?"#8B0000":"#555"}});
      const cb=h("input",{type:"checkbox",style:{display:"none"}});
      if(checked)cb.checked=true;
      cb.addEventListener("change",()=>{
        let cats=edited.categories||[];cats=cb.checked?[...cats,cat]:cats.filter(x=>x!==cat);edited.categories=cats;
        pill.style.border="2px solid "+(cb.checked?"#8B0000":"#ddd");
        pill.style.background=cb.checked?"#fff5f5":"white";
        pill.style.color=cb.checked?"#8B0000":"#555";
      });
      pill.appendChild(cb);pill.appendChild(document.createTextNode(cat));checkRow.appendChild(pill);
    });
    catWrap.appendChild(checkRow);modal.appendChild(catWrap);

    // Description
    const descIn=h("textarea",{rows:"6",placeholder:"Event description…",onInput:ev=>{edited.description=ev.target.value;}},edited.description||"");
    Object.assign(descIn.style,{whiteSpace:"pre-wrap",lineHeight:"1.5"});

    // Contact
    const contactIn=h("input",{type:"email",value:edited.contact||"",onInput:ev=>{edited.contact=ev.target.value;}});
    modal.appendChild(ef("Contact Email",contactIn));

    // Approved toggle

      padding:"10px 14px",background:"#f9f9f9",borderRadius:"8px"});
    const approvedCb=h("input",{type:"checkbox",style:{width:"18px",height:"18px",cursor:"pointer"}});
    approvedCb.checked=!!edited.approved;
    approvedCb.addEventListener("change",()=>{edited.approved=approvedCb.checked;});
    approvedRow.appendChild(approvedCb);
    approvedRow.appendChild(h("label",{style:{fontSize:"14px",fontWeight:"600",color:"#333",cursor:"pointer"},
      onClick:()=>{approvedCb.checked=!approvedCb.checked;edited.approved=approvedCb.checked;}},"Show as live / approved"));
    modal.appendChild(approvedRow);

    // Save / Cancel buttons
    const btnRow=div({display:"flex",gap:"10px"});
    btnRow.appendChild(h("button",{class:"btn btn-red",style:{flex:"1",padding:"11px"},onClick:async()=>{
      try{
        await apiUpdateEvent(edited.id,{
          title:edited.title,business:edited.business,address:edited.address,
          date:edited.date,endDate:edited.endDate||edited.date,time:edited.time,
          categories:edited.categories,description:edited.description,
          contact:edited.contact,approved:edited.approved
        });
        S.events=S.events.map(x=>x.id===edited.id?{...edited}:x);
        overlay.remove();render();
      }catch(err){alert("Save failed: "+err.message);}
    }},"💾 Save Changes"));
    btnRow.appendChild(h("button",{class:"btn btn-gray",style:{flex:"1",padding:"11px"},
      onClick:()=>overlay.remove()},"Cancel"));
    modal.appendChild(btnRow);
    overlay.appendChild(modal);
  }

  buildModal();
  document.body.appendChild(overlay);
}

const ITIN_TAGS = ["Coffee and Drinks","Dining","Art and Music","Shopping","Happy Hour","Date Night","Family Friendly","Health and Wellness","Community"];

function checkRateLimit(){
  const MAX=5;
  const today=new Date().toISOString().slice(0,10);
  let data={date:"",count:0};
  try{const s=localStorage.getItem("mag-itin-rl");if(s)data=JSON.parse(s);}catch{}
  if(data.date!==today) data={date:today,count:0};
  if(data.count>=MAX) return false;
  data.count++;
  try{localStorage.setItem("mag-itin-rl",JSON.stringify(data));}catch{}
  return true;
}

function getRateLimitRemaining(){
  const MAX=5;
  const today=new Date().toISOString().slice(0,10);
  let data={date:"",count:0};
  try{const s=localStorage.getItem("mag-itin-rl");if(s)data=JSON.parse(s);}catch{}
  if(data.date!==today) return MAX;
  return Math.max(0,MAX-data.count);
}

async function generateItinerary(){
  const{date,interests}=S.itin;
  if(!date||interests.length===0) return;
  if(!checkRateLimit()){
    set({itin:{...S.itin,error:"You've reached the limit of 5 itineraries per day. Come back tomorrow!",loading:false}});
    return;
  }
  set({itin:{...S.itin,loading:true,error:null,result:null}});

  const dayEvents=S.events.filter(e=>{
    if(!e.approved) return false;
    const start=e.date, end=e.endDate||e.date;
    return date>=start&&date<=end;
  });

  const matchingBiz=BUSINESS_PROFILES.filter(b=>b.tags.some(t=>interests.includes(t))).sort((a,b)=>a.num-b.num);
  const fd=fmtDay(date);

  const eventList=dayEvents.length>0
    ? dayEvents.map(e=>"- "+e.title+" at "+e.business+" ("+e.address+")"+(e.time?" at "+e.time:"")+": "+e.description).join("\n")
    : "No specific events posted for this day.";

  // Enrich with real business profiles from Airtable if available
  const bizList=matchingBiz.map(b=>{
    const profile=S.businesses.find(p=>p.name===b.name);
    const desc=profile&&profile.description?profile.description:b.vibe;
    const knownFor=profile&&profile.knownFor?" Known for: "+profile.knownFor:"";
    const mustTry=profile&&profile.mustTry?" Must try: "+profile.mustTry:"";
    const hours=profile&&profile.hours?profile.hours:b.hours;
    return "- "+b.name+" ("+b.address+"): "+desc+knownFor+mustTry+" Hours: "+hours;
  }).join("\n");

  const promptParts=[
    "You are a knowledgeable, enthusiastic local guide for Magnolia Avenue in Fort Worth, Texas",
    "a beloved independent business district known for its creative community-minded spirit.",
    "You know every business personally.",
    "",
    "A visitor wants to plan a visit on "+fd.full+". Their interests are: "+interests.join(", ")+".",
    "",
    "EVENTS HAPPENING THAT DAY:",
    eventList,
    "",
    "BUSINESSES ON MAGNOLIA AVE THAT MATCH THEIR INTERESTS:",
    bizList,
    "",
    "Write a warm personal 3-4 stop itinerary. Format as numbered stops with a suggested time for each.",
    "Write like a knowledgeable friend giving advice — conversational, specific, enthusiastic but not over the top.",
    "Include practical details like timing and what to order or look for. End with a one-sentence send-off.",
    "Weave any events that day naturally into the itinerary as highlights.",
    "Sequence stops geographically — lower address numbers are further west, higher are further east.",
    "Keep the whole thing to about 200-250 words."
  ];
  const prompt=promptParts.join("\n");

  try{
    const response=await fetch("/api/itinerary",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:prompt}]})
    });
    const data=await response.json();
    const text=data.content&&data.content[0]&&data.content[0].text;
    if(!text) throw new Error("No response from AI");
    set({itin:{...S.itin,loading:false,result:text,error:null}});
  }catch(err){
    set({itin:{...S.itin,loading:false,error:"Could not generate itinerary: "+err.message}});
  }
}

        onClick:async function(){
          if(!confirm("Delete "+b.name+"'s profile?")) return;
          try{await apiDeleteBusiness(b.id);S.businesses=S.businesses.filter(x=>x.id!==b.id);render();}
          catch(err){set({bizError:"Delete failed: "+err.message});}
        }},"Delete"));
      topRow.appendChild(editBtns);
      card.appendChild(topRow);
      if(b.description) card.appendChild(h("div",{style:{fontSize:"13.5px",color:"#444",lineHeight:"1.5",marginBottom:"6px"}},b.description));
      const tags=div({display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"6px"});
      if(b.knownFor) tags.appendChild(div({background:"#F3E5F5",color:"#4A148C",borderRadius:"6px",padding:"3px 9px",fontSize:"12px"},"🌟 "+b.knownFor));
      if(b.mustTry) tags.appendChild(div({background:"#E8F5E9",color:"#1B5E20",borderRadius:"6px",padding:"3px 9px",fontSize:"12px"},"✨ Must try: "+b.mustTry));
      if(b.bestTime) tags.appendChild(div({background:"#FFF3E0",color:"#E65100",borderRadius:"6px",padding:"3px 9px",fontSize:"12px"},"⏰ "+b.bestTime));
      if(b.website||b.instagram){
        if(b.website) tags.appendChild(h("a",{href:b.website,target:"_blank",style:{background:"#E3F2FD",color:"#1565C0",borderRadius:"6px",padding:"3px 9px",fontSize:"12px",textDecoration:"none"}},"🌐 Website"));
        if(b.instagram) tags.appendChild(h("a",{href:"https://instagram.com/"+b.instagram.replace("@",""),target:"_blank",style:{background:"#FCE4EC",color:"#880E4F",borderRadius:"6px",padding:"3px 9px",fontSize:"12px",textDecoration:"none"}},"📸 "+b.instagram));
      }
      if(tags.children.length>0) card.appendChild(tags);
      inner.appendChild(card);
    });
  }

  page.appendChild(inner);
  return page;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(async()=>{
  render();
  try{
    const [evs, bizs] = await Promise.all([apiLoadEvents(), apiLoadBusinesses()]);
    set({events:evs, businesses:bizs, loading:false});
  } catch(err){
    set({loading:false, error:err.message});
  }
})();
</script>
